name: CI — Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Backend repo
        uses: actions/checkout@v4

      - name: Checkout Frontend repo
        uses: actions/checkout@v4
        with:
          repository: HuyVTr/Frontend-J2EE-PawVerse
          path: Frontend-J2EE-PawVerse

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend-J2EE-PawVerse
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/pawverse-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/pawverse-frontend:${{ steps.vars.outputs.sha_short }}
